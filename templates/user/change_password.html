{% extends "base.html" %}
{% block title %}{{ t('change_password') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card auth-card">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-lock"></i> {{ t('change_password') }}</h3>
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">{{ t('current_password') }}</label>
                        <input type="password" class="form-control" name="old_password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('new_password') }}</label>
                        <input type="password" class="form-control" name="new_password" required minlength="6" placeholder="{{ t('password_rules') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('confirm_password') }}</label>
                        <input type="password" class="form-control" name="confirm" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">{{ t('change_password') }}</button>
                    <div class="text-center">
                        <a href="/user/settings">{{ t('back_to_settings') }}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
