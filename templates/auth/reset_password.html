{% extends "base.html" %}
{% block title %}{{ t('reset_password') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card auth-card">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-key"></i> {{ t('reset_password') }}</h3>
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">{{ t('email') }}</label>
                        <input type="email" class="form-control" name="email" required placeholder="{{ t('reset_email_placeholder') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('new_password') }}</label>
                        <input type="password" class="form-control" name="new_password" required
                               minlength="6" placeholder="{{ t('password_rules') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('confirm_password') }}</label>
                        <input type="password" class="form-control" name="confirm" required placeholder="{{ t('confirm_password') }}">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">{{ t('reset_password') }}</button>
                    <div class="text-center">
                        <a href="/login">{{ t('back_to_login') }}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
